name: Weekly GA Analytics Fetch

on:
  schedule:
    # 毎週日曜日 09:00 JST (= 00:00 UTC)
    - cron: "0 0 * * 0"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  fetch-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Verify secrets are configured
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          if [ -z "$GA_PROPERTY_ID" ]; then
            echo "::error::GA_PROPERTY_ID シークレットが未設定です"
            exit 1
          fi
          if [ -z "$GOOGLE_CREDENTIALS_JSON" ]; then
            echo "::error::GOOGLE_CREDENTIALS_JSON シークレットが未設定です"
            exit 1
          fi

      - name: Fetch GA4 analytics data (past 7 days)
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: npm run fetch-analytics:weekly

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force context/analytics/*.csv
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: add weekly GA analytics report $(date -u +%Y%m%d)"
            git push
          fi
